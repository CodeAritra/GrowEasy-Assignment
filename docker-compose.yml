services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env.${APP_ENV:-development}
    environment:
      - DATABASE_PATH=/app/data/leads.db
    volumes:
      # Persists the SQLite database so data remains when containers restart
      - sqlite_data:/app/data
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - APP_ENV=${APP_ENV:-development}
    env_file:
      - ./frontend/.env.${APP_ENV:-development}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  sqlite_data:
